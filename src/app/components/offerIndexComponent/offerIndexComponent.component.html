<p-panel class="my-2 custom-panel">
    <ng-template #header>
        <div class="flex flex-column">
            <div class="font-italic">{{getFormattedName(offer.root.constructor.name)}}</div>
            <div class="font-bold text-xl">
                {{offer.root.name}}
            </div>
        </div>
    </ng-template> 
    <p-tabs class="w-full custom-tabs" value="0">
        <p-tablist>
            <p-tab value="0">Index</p-tab>
            <p-tab value="1">Tree</p-tab>
        </p-tablist>
        <p-tabpanels class="p-0 overflow-auto">
            <p-tabpanel value="0">
                @if (menuItemsRoot()) {
                    <ul class="my-1">
                        <ng-container
                            *ngTemplateOutlet="nodeTemplate; context: { $implicit: menuItemsRoot() }">
                        </ng-container>
                    </ul>
                }
            </p-tabpanel>
            <p-tabpanel value="1">
                <br>
                <div class="flex">
                    <div class="flex flex-column justify-content-start gap-3 p-2 max-h-10rem">
                        <i class="pi pi-search-plus" style="font-size: 1rem"></i>
                        <p-slider [ngModel]="scale()" (ngModelChange)="updateScale($event)" orientation="vertical" min="0.25" max="1.5" step="0.05" class="flex justify-content-center custom-slider"/>
                        <i class="pi pi-search-minus" style="font-size: 1rem"></i>
                    </div>
                    <div class="zoom-wrapper">
                        <div class="zoom-content" [style.zoom]="scale()">
                            <p-organization-chart 
                                class="custom-org-chart" [value]="treeNodeRoot()" [collapsible]="true" selectionMode="single" 
                                [selection]="selectedTreeNode()" (selectionChange)="onTreeNodeSelection($event)">
                            </p-organization-chart>
                        </div>
                    </div>
                </div>
            </p-tabpanel>
        </p-tabpanels>
    </p-tabs>
</p-panel>

<ng-template #nodeTemplate let-node>
    <li class="flex align-items-start gap-2">
        <div class="flex flex-column">
            <a (click)="onMenuItemSelection(node.id!)" 
                [ngClass]="{ 'font-bold': node.id === selectedMenuItemId(), 'custom-panel-element': node.id !== selectedMenuItemId() }"
            >
                {{ node.label }}       
            </a>
            <span class="block text-xs">{{node.data}}</span>
        </div>
    </li>
    @if (node.items && node.items.length > 0) {
        <ul>
            @for (node of node.items; track node.id) {
                <ng-container
                    *ngTemplateOutlet="nodeTemplate; context: { $implicit: node }">
                </ng-container>
            }
        </ul>
    }
</ng-template>
